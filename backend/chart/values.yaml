# Default values for ssu-mgmt.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1
managedByHelm: true
environment: "develop"

image:
  repository: dfdsdk/ssu-mgmt
  pullPolicy: Always
  tag: "latest"

app:
  config:
    confSecretRef: ssu-mgmt
  environment:
    - name: SSU__LOG_LEVEL
      value: info
    - name: SSU__MESSAGING__GROUP_ID
      value: cloudengineering.ssu-mgmt
    # jemalloc tuning (the binary uses jemalloc as its global allocator). Enable the
    # background purge thread and shorten the decay so freed memory is returned to the OS
    # promptly — keeps RSS down on the long-running ingest/SIEM workers. tikv-jemallocator
    # reads the `_RJEM_`-prefixed env var.
    - name: _RJEM_MALLOC_CONF
      value: "background_thread:true,dirty_decay_ms:5000,muzzy_decay_ms:5000"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  awsRoleArn: ""
  # Annotations to add to the service account
  annotations:
    eks.amazonaws.com/sts-regional-endpoints: "true"
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 8080
  metricsPort: 8888
  scrapeMetrics: true

ingress:
  enabled: true
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  match: Host(`localhost`)
  matches:
    - name: ssu-mgmt
      match: Host(`localhost`)
  middlewares: []
  services: []
  routes: []
    # - kind: Rule
    #   match: Host(`localhost`)
    #   priority: 90
    #   middlewares: []
    #   services:
    #     - kind: Service
    #       name: ssu-mgmt
    #       namespace: selfservice
    #       port: external

resources:
  requests:
    memory: "1000Mi"
    cpu: "200m"
  limits:
    memory: "4600Mi"
    cpu: "3000m"


nodeSelector: {}

tolerations: []

affinity: {}

topologySpreadConstraints: {}